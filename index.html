<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #111827;
}

.nav button {
    padding: 8px 12px;
    border: none;
    background: #00ffcc;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
}

/* SEARCH */
.search {
    text-align: center;
    margin: 15px;
}

.search input {
    width: 60%;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

/* CATEGORY */
.cat {
    color: #00ffcc;
    font-weight: bold;
    padding: 15px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 0 15px 20px;
}

/* CARD */
.card {
    background: #1f2937;
    padding: 12px;
    border-radius: 12px;
}

.card a {
    display: inline-block;
    margin-top: 10px;
    background: #00ffcc;
    padding: 8px;
    border-radius: 6px;
    text-decoration: none;
    color: black;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="nav">
    <div>🎮 Game Hub</div>
    <div>
        <button onclick="showHome()">Home</button>
        <button onclick="showProfile()">Profile</button>
    </div>
</div>

<!-- HOME -->
<div id="home">

<div class="search">
    <input onkeyup="searchGames(this.value)" placeholder="Search games...">
</div>

<div class="cat">Arcade</div>
<div class="grid">

<div class="card">
    <div>🏓 Ping Pong Duel</div>
    <a href="https://replit.com/@Rantala12/Ping-Pong-Duel" target="_blank">Play</a>
</div>

<div class="card">
    <div>🚗 Auto Arena</div>
    <a href="https://replit.com/@Rantala12/Auto-Arena" target="_blank">Play</a>
</div>

</div>

<div class="cat">Geometry</div>
<div class="grid">

<div class="card">
    <div>⬛ Geometry Dash</div>
    <a href="https://replit.com/@AaKaRa/Geometry-Dash" target="_blank">Play</a>
</div>

<div class="card">
    <div>🟦 Geometry Leveler</div>
    <a href="https://replit.com/@AaKaRa/Geometry-Leveler" target="_blank">Play</a>
</div>

</div>

<div class="cat">Puzzle</div>
<div class="grid">

<div class="card">
    <div>🔴 Connect Four</div>
    <a href="https://replit.com/@aadarantala/Connect-Four" target="_blank">Play</a>
</div>

<div class="card">
    <div>🧩 Buzzle Masters</div>
    <a href="https://replit.com/@aadarantala/Buzzle-Masters" target="_blank">Play</a>
</div>

</div>

</div>

<!-- PROFILE -->
<div id="profile" style="display:none; padding:20px;">
    <h2>👤 Profile</h2>
    <p>Name: <span id="name"></span></p>
</div>

<script>

// HOME / PROFILE FIX
function showHome() {
    document.getElementById("home").style.display = "block";
    document.getElementById("profile").style.display = "none";
}

function showProfile() {
    document.getElementById("home").style.display = "none";
    document.getElementById("profile").style.display = "block";

    let n = localStorage.getItem("name");
    if (!n) {
        n = prompt("Enter your name:");
        localStorage.setItem("name", n);
    }
    document.getElementById("name").innerText = n;
}

// SEARCH FIX (ei riko layoutia)
function searchGames(value) {
    value = value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let text = card.innerText.toLowerCase();
        card.style.display = text.includes(value) ? "block" : "none";
    });
}

</script>

</body>
</html>
