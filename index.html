<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
}

/* HEADER */
header {
    background: linear-gradient(90deg, #00ffcc, #0066ff);
    padding: 25px;
    text-align: center;
    font-size: 32px;
    font-weight: bold;
}

/* CATEGORY TITLE */
.category {
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
    color: #00ffcc;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 0 20px 30px 20px;
}

/* CARD */
.card {
    background: #141b2d;
    border-radius: 15px;
    padding: 15px;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px #00ffcc;
}

/* ICON */
.thumb {
    height: 110px;
    border-radius: 10px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #00ffcc, #0066ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
}

/* TITLE */
.title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 10px;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 8px 12px;
    background: #00ffcc;
    color: black;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

.btn:hover {
    background: #00c2a8;
}
</style>
</head>

<body>

<header>🎮 GAME HUB</header>

<!-- ARCADE -->
<div class="category">🔥 Arcade Games</div>
<div class="grid">

    <div class="card">
        <div class="thumb">🏓</div>
        <div class="title">Ping Pong Duel</div>
        <a class="btn" href="https://replit.com/@Rantala12/Ping-Pong-Duel" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">🚗</div>
        <div class="title">Auto Arena</div>
        <a class="btn" href="https://replit.com/@Rantala12/Auto-Arena" target="_blank">Play</a>
    </div>

</div>

<!-- GEOMETRY -->
<div class="category">🟢 Geometry Games</div>
<div class="grid">

    <div class="card">
        <div class="thumb">🟩</div>
        <div class="title">Geometry Challenge</div>
        <a class="btn" href="https://replit.com/@AaKaRa/Geometry-Challenge" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">⬛</div>
        <div class="title">Geometry Dash</div>
        <a class="btn" href="https://replit.com/@AaKaRa/Geometry-Dash" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">🟦</div>
        <div class="title">Geometry Leveler</div>
        <a class="btn" href="https://replit.com/@AaKaRa/Geometry-Leveler" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">📏</div>
        <div class="title">Geometry Dash Levels</div>
        <a class="btn" href="https://replit.com/@AaKaRa/Geometry-Dash-Levels" target="_blank">Play</a>
    </div>

</div>

<!-- PUZZLE -->
<div class="category">🧠 Puzzle Games</div>
<div class="grid">

    <div class="card">
        <div class="thumb">🔴🟡</div>
        <div class="title">Connect Four</div>
        <a class="btn" href="https://replit.com/@aadarantala/Connect-Four" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">🧩</div>
        <div class="title">Buzzle Masters</div>
        <a class="btn" href="https://replit.com/@aadarantala/Buzzle-Masters" target="_blank">Play</a>
    </div>

</div>

</body>
</html>
