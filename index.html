<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:linear-gradient(135deg,#00c6ff,#0072ff);
padding:30px;
text-align:center;
}

header h1{font-size:3rem;}
header p{margin-top:10px;opacity:.9;}

.topbar{
padding:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.search{
padding:12px;
width:280px;
border:none;
border-radius:10px;
}

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.stat{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
}

.stat h2{color:#38bdf8;}

.section{padding:20px;}

.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
transition:.25s;
}

.card:hover{transform:translateY(-5px);}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{padding:15px;}

.card-buttons{
display:flex;
gap:10px;
margin-top:10px;
}

.play{
background:#22c55e;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
flex:1;
}

footer{
padding:30px;
text-align:center;
opacity:.7;
}

/* LOGIN */
.loginBox{
display:flex;
gap:10px;
justify-content:center;
padding:10px;
flex-wrap:wrap;
}

.loginBox input{
padding:10px;
border-radius:10px;
border:none;
width:180px;
}
</style>
</head>

<body>

<header>
<h1>🎮 Game Hub</h1>
<p>Play the best games from AaKaRa Studios</p>
</header>

<!-- LOGIN -->
<div class="loginBox">
<input type="password" id="vipCode" placeholder="Enter VIP code">
<button class="btn" onclick="login()">Login</button>
<button class="btn" onclick="logout()">Logout</button>
<span id="loginStatus"></span>
</div>

<div class="topbar">
<input class="search" id="search" placeholder="Search games...">

<button class="btn" onclick="showAll()">Home</button>
<button class="btn" onclick="showVIP()">VIP</button>
</div>

<div class="stats">
<div class="stat"><h2 id="level">1</h2><p>Level</p></div>
<div class="stat"><h2 id="xp">0</h2><p>XP</p></div>
<div class="stat"><h2 id="played">0</h2><p>Played</p></div>
</div>

<div class="section">
<h2>🎮 Store</h2>
<div id="games"></div>
</div>

<footer>
<p>Game Hub Ultimate</p>
</footer>
<script>

const VIP_CODE = "GAMEHUB2026";

function login(){
const code = document.getElementById("vipCode").value;

if(code === VIP_CODE){
localStorage.setItem("vip","true");
document.getElementById("loginStatus").innerText="✅ VIP unlocked";
render(games);
}else{
document.getElementById("loginStatus").innerText="❌ Wrong code";
}
}

function logout(){
localStorage.removeItem("vip");
document.getElementById("loginStatus").innerText="Logged out";
render(games);
}

function isVIP(){
return localStorage.getItem("vip")==="true";
}

function showVIP(){
if(!isVIP()){
alert("VIP only 🔒");
return;
}
render(games.filter(g=>g.vip));
}

function showAll(){
render(games);
}

// 🎮 GAMES
const games = [
{
name:"Rhythm Runner",
category:"Arcade",
image:"https://images.unsplash.com/photo-1614680376593-902f74cf0d41?w=800",
link:"https://rhythm-runner--aakara.replit.app/",
vip:false
},
{
name:"Buzzle Masters",
category:"Puzzle",
image:"https://images.unsplash.com/photo-1553484771-047a44eee27b?w=800",
link:"https://buzzle-masters--aadarantala.replit.app/",
vip:false
},
{
name:"8 Ball Pool Online",
category:"Sports",
image:"https://images.unsplash.com/photo-1600172454284-9346d31e2fdd?w=800",
link:"https://8-ball-pool-online-multiplayers--aadarantalaa1.replit.app/",
vip:false
},
{
name:"Geometry Dash",
category:"Arcade",
image:"https://images.unsplash.com/photo-1627856014754-2907e2345c7f?w=800",
link:"#",
vip:false
}
];

function render(list){
document.getElementById("games").innerHTML =
list.map(g=>`
<div class="card">
<img src="${g.image}">
<div class="card-content">
<h3>${g.name}</h3>
<p>${g.category}</p>

<div class="card-buttons">
<button class="play" onclick="window.open('${g.link}','_blank')">Play</button>
</div>

</div>
</div>
`).join("");
}

render(games);

</script>

</body>
</html>
