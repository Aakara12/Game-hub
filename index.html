<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #050816);
    color: white;
}

/* TOP BAR */
header {
    background: linear-gradient(90deg, #00ffcc, #0066ff);
    padding: 25px;
    text-align: center;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 2px;
}

/* SEARCH */
.search {
    display: flex;
    justify-content: center;
    margin: 20px;
}

.search input {
    width: 60%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

/* CATEGORY */
.category {
    padding: 20px 40px 10px;
    font-size: 20px;
    font-weight: 700;
    color: #00ffcc;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    padding: 0 40px 40px;
}

/* CARD */
.card {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 15px;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 0 25px #00ffcc;
}

/* ICON */
.thumb {
    height: 120px;
    border-radius: 12px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #00ffcc, #0066ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
}

/* TITLE */
.title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 10px;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 10px 14px;
    background: #00ffcc;
    color: black;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 700;
    transition: 0.2s;
}

.btn:hover {
    background: #00c2a8;
}
</style>
</head>

<body>

<header>🎮 GAME HUB</header>

<div class="search">
    <input type="text" id="search" placeholder="Search games...">
</div>

<!-- ARCADE -->
<div class="category">🔥 Arcade Games</div>
<div class="grid">

    <div class="card">
        <div class="thumb">🏓</div>
        <div class="title">Ping Pong Duel</div>
        <a class="btn" href="https://replit.com/@Rantala12/Ping-Pong-Duel" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">🚗</div>
        <div class="title">Auto Arena</div>
        <a class="btn" href="https://replit.com/@Rantala12/Auto-Arena" target="_blank">Play</a>
    </div>

</div>

<!-- GEOMETRY -->
<div class="category">🟢 Geometry Games</div>
<div class="grid">

    <div class="card">
        <div class="thumb">🟩</div>
        <div class="title">Geometry Challenge</div>
        <a class="btn" href="https://replit.com/@AaKaRa/Geometry-Challenge" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">⬛</div>
        <div class="title">Geometry Dash</div>
        <a class="btn" href="https://replit.com/@AaKaRa/Geometry-Dash" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">🟦</div>
        <div class="title">Geometry Leveler</div>
        <a class="btn" href="https://replit.com/@AaKaRa/Geometry-Leveler" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">📏</div>
        <div class="title">Geometry Dash Levels</div>
        <a class="btn" href="https://replit.com/@AaKaRa/Geometry-Dash-Levels" target="_blank">Play</a>
    </div>

</div>

<!-- PUZZLE -->
<div class="category">🧠 Puzzle Games</div>
<div class="grid">

    <div class="card">
        <div class="thumb">🔴🟡</div>
        <div class="title">Connect Four</div>
        <a class="btn" href="https://replit.com/@aadarantala/Connect-Four" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">🧩</div>
        <div class="title">Buzzle Masters</div>
        <a class="btn" href="https://replit.com/@aadarantala/Buzzle-Masters" target="_blank">Play</a>
    </div>

</div>

<script>
// SEARCH FILTER
const search = document.getElementById("search");
search.addEventListener("input", function() {
    const value = this.value.toLowerCase();
    const cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        const title = card.querySelector(".title").innerText.toLowerCase();
        card.style.display = title.includes(value) ? "block" : "none";
    });
});
</script>

</body>
</html>
