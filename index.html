<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:linear-gradient(135deg,#00c6ff,#0072ff);
padding:30px;
text-align:center;
}

header h1{
font-size:3rem;
}

header p{
margin-top:10px;
opacity:.9;
}

.topbar{
padding:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.search{
padding:12px;
width:300px;
max-width:90%;
border:none;
border-radius:10px;
}

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.btn:hover{
opacity:.9;
}

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.stat{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
}

.stat h2{
color:#38bdf8;
}

.hero{
margin:20px;
background:linear-gradient(
135deg,
#2563eb,
#7c3aed
);
padding:30px;
border-radius:20px;
}

.hero h2{
font-size:2rem;
margin-bottom:10px;
}

.hero button{
margin-top:15px;
}

.section{
padding:20px;
}

.section h2{
margin-bottom:15px;
color:#38bdf8;
}

.games{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card h3{
margin-bottom:10px;
}

.card p{
opacity:.8;
font-size:.9rem;
}

.card-buttons{
margin-top:15px;
display:flex;
gap:10px;
}

.play{
background:#22c55e;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
flex:1;
}

.favorite{
background:#ef4444;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

footer{
padding:30px;
text-align:center;
opacity:.7;
}

</style>
</head>

<body>

<header>
<h1>🎮 Game Hub</h1>
<p>Play the best games from AaKaRa Studios</p>
</header>

<div class="topbar">

<input
type="text"
id="search"
class="search"
placeholder="Search games..."
>

<button class="btn" onclick="showAllGames()">
🏠 Home
</button>
  
<h2>🎮 Store</h2>

<div id="gamesContainer" class="games"></div>

<button class="btn" onclick="showFavorites()">
❤️ Favorites
</button>

<button class="btn" onclick="showRecent()">
⏱ Recent
</button>

<button class="btn" onclick="showRecommended()">
✨ Recommended
</button>

</div>

<div class="stats">

<div class="stat">
<h2 id="level">1</h2>
<p>Level</p>
</div>

<div class="stat">
<h2 id="xp">0</h2>
<p>XP</p>
</div>

<div class="stat">
<h2 id="played">0</h2>
<p>Games Played</p>
</div>

</div>

<div class="hero">

<h2>🔥 Featured Game</h2>

<h3>Geometry Dash</h3>

<p>
Jump, dodge and survive
through challenging levels.
</p>

<button
class="btn"
onclick="window.open('https://replit.com/@AaKaRa/Geometry-Dash')">
Play Now
</button>

</div>

<div class="section">

<div
id="gamesContainer"
class="games">
</div
