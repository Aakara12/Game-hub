<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Game Hub</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 30px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      width: 260px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #38bdf8;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<h1>🎮 Game Hub</h1>

<div class="grid">

  <!-- Rhythm Runner -->
  <div class="card">
    <h2>🎵 Rhythm Runner</h2>
    <a class="btn" href="https://rhythm-runner--AaKaRa.replit.app" target="_blank">
      Pelaa
    </a>
  </div>

  <!-- Geometry Challenge (2-player) -->
  <div class="card">
    <h2>📐 Geometry Challenge</h2>
    <p>2 pelaajan peli</p>
    <a class="btn" href="https://replit.com/@AaKaRa/Geometry-Challenge" target="_blank">
      Pelaa
    </a>
  </div>

  <!-- Eight Ball Arena -->
  <div class="card">
    <h2>🎱 Eight Ball Arena</h2>
    <a class="btn" href="https://eight-ball-arena--aadarantalaa.replit.app/" target="_blank">
      Pelaa
    </a>
  </div>

</div>

</body>
</html>
