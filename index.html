<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:linear-gradient(135deg,#00c6ff,#0072ff);
padding:30px;
text-align:center;
}

header h1{
font-size:3rem;
}

header p{
margin-top:10px;
opacity:.9;
}

.topbar{
padding:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.search{
padding:12px;
width:300px;
max-width:90%;
border:none;
border-radius:10px;
}

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.btn:hover{
opacity:.9;
}

.loginBox{
display:flex;
gap:10px;
justify-content:center;
padding:15px;
flex-wrap:wrap;
}

.loginBox input{
padding:10px;
border:none;
border-radius:10px;
width:180px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.stat{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
}

.stat h2{
color:#38bdf8;
}

.hero{
margin:20px;
background:linear-gradient(
135deg,
#2563eb,
#7c3aed
);
padding:30px;
border-radius:20px;
}

.hero h2{
font-size:2rem;
margin-bottom:10px;
}

.hero button{
margin-top:15px;
}

.section{
padding:20px;
}

.section h2{
margin-bottom:15px;
color:#38bdf8;
}

.games{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card h3{
margin-bottom:10px;
}

.card p{
opacity:.8;
font-size:.9rem;
}

.card-buttons{
margin-top:15px;
display:flex;
gap:10px;
}

.play{
background:#22c55e;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
flex:1;
}

.favorite{
background:#ef4444;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

footer{
padding:30px;
text-align:center;
opacity:.7;
}

</style>
</head>

<body>

<header>
<h1>🎮 Game Hub</h1>
<p>Play the best games from AaKaRa Studios</p>
</header>

<div class="loginBox">

<input
type="password"
id="vipCode"
placeholder="Enter VIP code">

<button class="btn" onclick="login()">
🔐 Login
</button>

<button class="btn" onclick="logout()">
🚪 Logout
</button>

<span id="loginStatus"></span>

</div>

<div class="topbar">

<input
type="text"
id="search"
class="search"
placeholder="Search games..."
>

<button class="btn" onclick="showAllGames()">
🏠 Home
</button>

<button class="btn" onclick="showFavorites()">
❤️ Favorites
</button>

<button class="btn" onclick="showRecent()">
⏱ Recent
</button>

<button class="btn" onclick="showRecommended()">
✨ Recommended
</button>

<button class="btn" onclick="showVIP()">
🔐 VIP
</button>

</div>

<div class="stats">

<div class="stat">
<h2 id="level">1</h2>
<p>Level</p>
</div>

<div class="stat">
<h2 id="xp">0</h2>
<p>XP</p>
</div>

<div class="stat">
<h2 id="played">0</h2>
<p>Games Played</p>
</div>

</div>

<div class="hero">

<h2>🔥 Featured Game</h2>

<h3>Rhythm Runner</h3>

<p>
Run with the rhythm and beat your high score.
</p>

<button
class="btn"
onclick="window.open('https://rhythm-runner--aakara.replit.app/')">
Play Now
</button>

</div>

<div class="section">

<h2>🎮 Store</h2>

<div
id="gamesContainer"
class="games">
</div>

</div>

<div
id="vipSection"
class="section"
style="display:none;">

<h2>🔐 VIP Games</h2>

<div
id="vipGamesContainer"
class="games">
</div>

</div>
<footer>

<p>🎮 Game Hub Ultimate Edition</p>
<p>Built with ❤️ by AaKaRa</p>

</footer>

<script>

const games = [

{
name:"Rhythm Runner",
category:"Arcade",
image:"https://images.unsplash.com/photo-1511512578047-dfb367046420?w=800",
description:"Run with the rhythm.",
link:"https://rhythm-runner--aakara.replit.app/"
},

{
name:"Buzzle Masters",
category:"Puzzle",
image:"https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=800",
description:"Solve fun puzzles.",
link:"https://buzzle-masters--aadarantala.replit.app/"
},

{
name:"8 Ball Pool Online",
category:"Sports",
image:"https://images.unsplash.com/photo-1600172454284-9346d31e2fdd?w=800",
description:"Play pool online.",
link:"https://8-ball-pool-online-multiplayers--aadarantalaa1.replit.app/"
},

{
name:"Geometry Dash",
category:"Arcade",
image:"https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=800",
description:"Coming Soon",
link:"#"
},

{
name:"Geometry Challenge",
category:"Arcade",
image:"https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800",
description:"Coming Soon",
link:"#"
},

{
name:"Geometry Leveler",
category:"Arcade",
image:"https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800",
description:"Coming Soon",
link:"#"
},

{
name:"Geometry Dash Levels",
category:"Arcade",
image:"https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=800",
description:"Coming Soon",
link:"#"
},

{
name:"Ping Pong Duel",
category:"Sports",
image:"https://images.unsplash.com/photo-1534158914592-062992fbe900?w=800",
description:"Coming Soon",
link:"#"
},

{
name:"Auto Arena",
category:"Racing",
image:"https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800",
description:"Coming Soon",
link:"#"
},

{
name:"Connect Four",
category:"Puzzle",
image:"https://images.unsplash.com/photo-1606092195730-5d7b9af1efc5?w=800",
description:"Coming Soon",
link:"#"
}

];

const vipGames = [

{
name:"Secret Geometry Test",
category:"VIP",
image:"https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800",
description:"Private test game.",
link:"#"
}

];

const VIP_CODE = "GAMEHUB2026";

let favorites =
JSON.parse(localStorage.getItem("favorites"))
|| [];

let recent =
JSON.parse(localStorage.getItem("recent"))
|| [];

let xp =
parseInt(localStorage.getItem("xp"))
|| 0;

let played =
parseInt(localStorage.getItem("played"))
|| 0;

function saveData(){

localStorage.setItem(
"favorites",
JSON.stringify(favorites)
);

localStorage.setItem(
"recent",
JSON.stringify(recent)
);

localStorage.setItem("xp",xp);
localStorage.setItem("played",played);

}

function updateStats(){

document.getElementById("xp").innerText = xp;

document.getElementById("played").innerText = played;

document.getElementById("level").innerText =
Math.floor(xp/100)+1;

}

function createCard(game){

let liked =
favorites.includes(game.name);

return `

<div class="card">

<img src="${game.image}">

<div class="card-content">

<h3>${game.name}</h3>

<p>${game.description}</p>

<p>🎮 ${game.category}</p>

<div class="card-buttons">

<button
class="play"
onclick="playGame('${game.name}')">

▶ Play

</button>

<button
class="favorite"
onclick="toggleFavorite('${game.name}')">

${liked ? "❤️" : "🤍"}

</button>

</div>

</div>

</div>

`;

}

function renderGames(list){

document.getElementById(
"gamesContainer"
).innerHTML =

list.map(createCard).join("");

}

function renderVIP(){

document.getElementById(
"vipGamesContainer"
).innerHTML =

vipGames.map(createCard).join("");

}

function playGame(name){

const game =
games.find(g => g.name === name)
||
vipGames.find(g => g.name === name);

if(!game) return;

if(game.link === "#"){

alert("Coming Soon 🆕");
return;

}

played++;
xp += 25;

recent =
recent.filter(g => g !== name);

recent.unshift(name);

if(recent.length > 8){
recent.pop();
}

saveData();
updateStats();

window.open(
game.link,
"_blank"
);

}

function toggleFavorite(name){

if(favorites.includes(name)){

favorites =
favorites.filter(
g => g !== name
);

}else{

favorites.push(name);

}

saveData();
renderGames(games);

}

function showFavorites(){

renderGames(

games.filter(
g => favorites.includes(g.name)
)

);

}

function showRecent(){

const list = [];

recent.forEach(name => {

const game =
games.find(
g => g.name === name
);

if(game){
list.push(game);
}

});

renderGames(list);

}

function showRecommended(){

renderGames(
games.slice(0,4)
);

}

function showAllGames(){

renderGames(games);

}

document
.getElementById("search")
.addEventListener(
"input",
function(){

const value =
this.value.toLowerCase();

renderGames(

games.filter(game =>

game.name
.toLowerCase()
.includes(value)

||

game.category
.toLowerCase()
.includes(value)

)

);

}
);

function login(){

const code =
document.getElementById(
"vipCode"
).value;

if(code === VIP_CODE){

localStorage.setItem(
"vip",
"true"
);

document.getElementById(
"loginStatus"
).innerText =
"✅ VIP UNLOCKED";

showVIP();

}else{

document.getElementById(
"loginStatus"
).innerText =
"❌ Wrong Code";

}

}

function logout(){

localStorage.removeItem(
"vip"
);

document.getElementById(
"vipSection"
).style.display =
"none";

document.getElementById(
"loginStatus"
).innerText =
"Logged Out";

}

function showVIP(){

if(
localStorage.getItem("vip")
=== "true"
){

document.getElementById(
"vipSection"
).style.display =
"block";

renderVIP();

}else{

alert(
"VIP Code Required 🔐"
);

}

}

renderGames(games);
updateStats();

</script>

</body>
</html>
