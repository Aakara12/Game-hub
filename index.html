<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #050816);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #0b1224;
    position: sticky;
    top: 0;
    z-index: 10;
}

.navbar h1 {
    font-size: 22px;
    color: #00ffcc;
}

.nav-buttons button {
    margin-left: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    background: #00ffcc;
}

/* SEARCH */
.search {
    display: flex;
    justify-content: center;
    margin: 20px;
}

.search input {
    width: 60%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* CATEGORY */
.category {
    padding: 20px 40px 10px;
    font-size: 20px;
    font-weight: 700;
    color: #00ffcc;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    padding: 0 40px 40px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 15px;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 0 25px #00ffcc;
}

.thumb {
    height: 120px;
    border-radius: 12px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #00ffcc, #0066ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
}

.title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 10px;
}

.btn {
    display: inline-block;
    padding: 10px 14px;
    background: #00ffcc;
    color: black;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 700;
}

.like {
    float: right;
    cursor: pointer;
    font-size: 18px;
}

/* PROFILE */
.profile {
    display: none;
    padding: 30px;
}

.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #00ffcc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: bold;
}

.profile-box {
    display: flex;
    align-items: center;
    gap: 20px;
}
</style>
</head>

<body>

<div class="navbar">
    <h1>🎮 Game Hub</h1>
    <div class="nav-buttons">
        <button onclick="showHome()">Home</button>
        <button onclick="showProfile()">Profile</button>
    </div>
</div>

<!-- SEARCH -->
<div class="search">
    <input type="text" id="search" placeholder="Search games...">
</div>

<!-- HOME -->
<div id="home">

<div class="category">🔥 Arcade Games</div>
<div class="grid">

    <div class="card">
        <div class="thumb">🏓</div>
        <div class="title">Ping Pong Duel <span class="like" onclick="like(this)">♡</span></div>
        <a class="btn" href="https://replit.com/@Rantala12/Ping-Pong-Duel" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">🚗</div>
        <div class="title">Auto Arena <span class="like" onclick="like(this)">♡</span></div>
        <a class="btn" href="https://replit.com/@Rantala12/Auto-Arena" target="_blank">Play</a>
    </div>

</div>

<div class="category">🟢 Geometry Games</div>
<div class="grid">

    <div class="card">
        <div class="thumb">⬛</div>
        <div class="title">Geometry Dash <span class="like" onclick="like(this)">♡</span></div>
        <a class="btn" href="https://replit.com/@AaKaRa/Geometry-Dash" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">🟦</div>
        <div class="title">Geometry Leveler <span class="like" onclick="like(this)">♡</span></div>
        <a class="btn" href="https://replit.com/@AaKaRa/Geometry-Leveler" target="_blank">Play</a>
    </div>

</div>

<div class="category">🧠 Puzzle Games</div>
<div class="grid">

    <div class="card">
        <div class="thumb">🔴</div>
        <div class="title">Connect Four <span class="like" onclick="like(this)">♡</span></div>
        <a class="btn" href="https://replit.com/@aadarantala/Connect-Four" target="_blank">Play</a>
    </div>

    <div class="card">
        <div class="thumb">🧩</div>
        <div class="title">Buzzle Masters <span class="like" onclick="like(this)">♡</span></div>
        <a class="btn" href="https://replit.com/@aadarantala/Buzzle-Masters" target="_blank">Play</a>
    </div>

</div>

</div>

<!-- PROFILE -->
<div id="profile" class="profile">

    <div class="profile-box">
        <div class="avatar" id="avatar">U</div>
        <div>
            <h2 id="username">Player</h2>
            <p>🎮 Games liked: <span id="likes">0</span></p>
        </div>
    </div>

</div>

<script>

// SEARCH
document.getElementById("search").addEventListener("input", function() {
    let value = this.value.toLowerCase();
    document.querySelectorAll(".card").forEach(card => {
        let title = card.innerText.toLowerCase();
        card.style.display = title.includes(value) ? "block" : "none";
    });
});

// LIKE SYSTEM
function like(el) {
    el.innerText = el.innerText === "♡" ? "❤️" : "♡";
    updateLikes();
}

function updateLikes() {
    let count = document.querySelectorAll(".like").length;
    let liked = document.querySelectorAll(".like").length;
    document.getElementById("likes").innerText = liked;
}

// PROFILE NAV
function showProfile() {
    document.getElementById("home").style.display = "none";
    document.getElementById("profile").style.display = "block";

    let name = localStorage.getItem("username");
    if (!name) {
        name = prompt("Enter your name:");
        localStorage.setItem("username", name);
    }

    document.getElementById("username").innerText = name;
    document.getElementById("avatar").innerText = name.charAt(0).toUpperCase();
}

function showHome() {
    document.getElementById("home").style.display = "block";
    document.getElementById("profile").style.display = "none";
}

</script>

</body>
</html>
