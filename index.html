<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:linear-gradient(135deg,#00c6ff,#0072ff);
padding:30px;
text-align:center;
}

header h1{
font-size:3rem;
}

header p{
margin-top:10px;
opacity:.9;
}

.topbar{
padding:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.search{
padding:12px;
width:300px;
max-width:90%;
border:none;
border-radius:10px;
}

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.btn:hover{
opacity:.9;
}

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.stat{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
}

.stat h2{
color:#38bdf8;
}

.hero{
margin:20px;
background:linear-gradient(
135deg,
#2563eb,
#7c3aed
);
padding:30px;
border-radius:20px;
}

.hero h2{
font-size:2rem;
margin-bottom:10px;
}

.hero button{
margin-top:15px;
}

.section{
padding:20px;
}

.section h2{
margin-bottom:15px;
color:#38bdf8;
}

.games{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card h3{
margin-bottom:10px;
}

.card p{
opacity:.8;
font-size:.9rem;
}

.card-buttons{
margin-top:15px;
display:flex;
gap:10px;
}

.play{
background:#22c55e;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
flex:1;
}

.favorite{
background:#ef4444;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

footer{
padding:30px;
text-align:center;
opacity:.7;
}

</style>
</head>

<body>

<header>
<h1>🎮 Game Hub</h1>
<p>Play the best games from AaKaRa Studios</p>
</header>

<div class="topbar">

<input
type="text"
id="search"
class="search"
placeholder="Search games..."
>

<button class="btn" onclick="showAllGames()">
🏠 Home
</button>

<button class="btn" onclick="showFavorites()">
❤️ Favorites
</button>

<button class="btn" onclick="showRecent()">
⏱ Recent
</button>

<button class="btn" onclick="showRecommended()">
✨ Recommended
</button>

</div>

<div class="stats">

<div class="stat">
<h2 id="level">1</h2>
<p>Level</p>
</div>

<div class="stat">
<h2 id="xp">0</h2>
<p>XP</p>
</div>

<div class="stat">
<h2 id="played">0</h2>
<p>Games Played</p>
</div>

</div>

<div class="hero">

<h2>🔥 Featured Game</h2>

<h3>Geometry Dash</h3>

<p>
Jump, dodge and survive
through challenging levels.
</p>

<button
class="btn"
onclick="window.open('https://replit.com/@AaKaRa/Geometry-Dash')">
Play Now
</button>

</div>

<div class="section">

<h2>🎮 Store</h2>

<div
id="gamesContainer"
class="games">
</div>

</div>
<script>

const games = [

{
name:"Geometry Dash",
category:"Arcade",
image:"https://images.unsplash.com/photo-1511512578047-dfb367046420?w=800",
description:"Jump and survive through difficult levels.",
link:"https://replit.com/@AaKaRa/Geometry-Dash"
},

{
name:"Geometry Challenge",
category:"Arcade",
image:"https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800",
description:"Challenge yourself with geometry obstacles.",
link:"https://replit.com/@AaKaRa/Geometry-Challenge"
},

{
name:"Geometry Leveler",
category:"Arcade",
image:"https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800",
description:"Level up and unlock new challenges.",
link:"https://replit.com/@AaKaRa/Geometry-Leveler"
},

{
name:"Geometry Dash Levels",
category:"Arcade",
image:"https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=800",
description:"Extra Geometry Dash adventures.",
link:"https://replit.com/@AaKaRa/Geometry-Dash-Levels"
},

{
name:"Ping Pong Duel",
category:"Sports",
image:"https://images.unsplash.com/photo-1534158914592-062992fbe900?w=800",
description:"Fast paced table tennis action.",
link:"https://replit.com/@Rantala12/Ping-Pong-Duel"
},

{
name:"Auto Arena",
category:"Racing",
image:"https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800",
description:"Race through the arena and dominate.",
link:"https://replit.com/@Rantala12/Auto-Arena"
},

{
name:"Connect Four",
category:"Puzzle",
image:"https://images.unsplash.com/photo-1606092195730-5d7b9af1efc5?w=800",
description:"Classic strategy board game.",
link:"https://replit.com/@aadarantala/Connect-Four"
},

{
name:"Buzzle Masters",
category:"Puzzle",
image:"https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=800",
description:"Solve puzzles and become a master.",
link:"https://replit.com/@aadarantala/Buzzle-Masters"
}

];

let favorites =
JSON.parse(localStorage.getItem("favorites"))
|| [];

let recent =
JSON.parse(localStorage.getItem("recent"))
|| [];

let xp =
parseInt(localStorage.getItem("xp"))
|| 0;

let played =
parseInt(localStorage.getItem("played"))
|| 0;

function saveData(){

localStorage.setItem(
"favorites",
JSON.stringify(favorites)
);

localStorage.setItem(
"recent",
JSON.stringify(recent)
);

localStorage.setItem(
"xp",
xp
);

localStorage.setItem(
"played",
played
);

}

function updateStats(){

document.getElementById("xp").innerText = xp;

document.getElementById("played").innerText =
played;

document.getElementById("level").innerText =
Math.floor(xp/100)+1;

}

function createCard(game){

let liked =
favorites.includes(game.name);

return `

<div class="card">

<img src="${game.image}">

<div class="card-content">

<h3>${game.name}</h3>

<p>${game.description}</p>

<p>🎮 ${game.category}</p>

<div class="card-buttons">

<button
class="play"
onclick="playGame('${game.name}')">

▶ Play

</button>

<button
class="favorite"
onclick="toggleFavorite('${game.name}')">

${liked ? "❤️" : "🤍"}

</button>

</div>

</div>

</div>

`;

}

function renderGames(list){

document.getElementById(
"gamesContainer"
).innerHTML =

list.map(createCard).join("");

}

renderGames(games);

updateStats();
  function playGame(name){

const game =
games.find(g => g.name === name);

if(!game) return;

played++;
xp += 25;

recent = recent.filter(
g => g !== name
);

recent.unshift(name);

if(recent.length > 8){
recent.pop();
}

saveData();
updateStats();

window.open(
game.link,
"_blank"
);

}

function toggleFavorite(name){

if(favorites.includes(name)){

favorites =
favorites.filter(
g => g !== name
);

}else{

favorites.push(name);

}

saveData();
renderGames(games);

}

function showFavorites(){

const favGames = games.filter(
g => favorites.includes(g.name)
);

renderGames(favGames);

}

function showRecent(){

const recentGames = [];

recent.forEach(name => {

const game =
games.find(
g => g.name === name
);

if(game){
recentGames.push(game);
}

});

renderGames(recentGames);

}

function showAllGames(){

renderGames(games);

}

function showRecommended(){

let recommended = [];

if(favorites.length > 0){

recommended = games.filter(game => {

return favorites.some(fav => {

const favGame =
games.find(
g => g.name === fav
);

return favGame &&
favGame.category ===
game.category;

});

});

}else{

recommended = games.slice(0,4);

}

renderGames(recommended);

}

document
.getElementById("search")
.addEventListener(
"input",
function(){

const value =
this.value.toLowerCase();

const filtered =
games.filter(game =>

game.name
.toLowerCase()
.includes(value)

||

game.category
.toLowerCase()
.includes(value)

);

renderGames(filtered);

}
);
  function getAchievements(){

const achievements = [

{
name:"🎮 First Game",
desc:"Play 1 game",
unlocked: played >= 1
},

{
name:"🔥 Gamer",
desc:"Play 5 games",
unlocked: played >= 5
},

{
name:"🏆 Pro Gamer",
desc:"Play 20 games",
unlocked: played >= 20
},

{
name:"❤️ Collector",
desc:"Favorite 3 games",
unlocked: favorites.length >= 3
},

{
name:"⭐ Level Up",
desc:"Reach Level 5",
unlocked: (Math.floor(xp/100)+1) >= 5
}

];

return achievements;

}

function renderAchievements(){

const oldSection =
document.getElementById(
"achievementSection"
);

if(oldSection){
oldSection.remove();
}

const section =
document.createElement("div");

section.className = "section";
section.id = "achievementSection";

section.innerHTML =
`
<h2>🏆 Achievements</h2>

<div class="games">

${getAchievements()
.map(a => `

<div class="card">

<div class="card-content">

<h3>${a.name}</h3>

<p>${a.desc}</p>

<p>

${
a.unlocked
? "✅ Unlocked"
: "🔒 Locked"
}

</p>

</div>

</div>

`)
.join("")}

</div>
`;

document.body.appendChild(
section
);

}

const oldUpdateStats =
updateStats;

updateStats = function(){

oldUpdateStats();

renderAchievements();

};

updateStats();
renderAchievements();

</script>

<footer>

<p>
🎮 Game Hub Ultimate Edition
</p>

<p>
Built with ❤️ by AaKaRa
</p>

</footer>

</body>
</html>
