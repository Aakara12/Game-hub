<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Game Hub</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 30px;
    }

    .game-card {
      background: #1e293b;
      width: 300px;
      margin: auto;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .game-card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #38bdf8;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

  <h1>🎮 Game Hub</h1>

  <div class="game-card">

    <!-- Sun kuva tähän -->
    <img src="SUN_KUVA_URL_TÄHÄN" alt="Game image">

    <h2>Rhythm Runner</h2>

    <a class="btn" href="https://rhythm-runner--AaKaRa.replit.app" target="_blank">
      Pelaa nyt 🎵
    </a>

  </div>

</body>
</html>
