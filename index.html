<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* NAV */
.navbar{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:#111827;
}

.navbar a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

.navbar a:hover{color:#38bdf8;}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}

.search{
  width:60%;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

/* CARD */
.card{
  background:#1f2937;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card h3{
  margin:10px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:8px 12px;
  background:#38bdf8;
  color:black;
  text-decoration:none;
  border-radius:8px;
}

.like{
  margin:10px;
  background:#ef4444;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
  <div><b>🎮 Game Hub</b></div>
  <div>
    <a href="#games">Games</a>
    <a href="profile.html">Profile</a>
  </div>
</div>

<div class="hero">
  <h1>GAME HUB</h1>
  <p>Play & Discover Games</p>

  <input class="search" id="search" placeholder="Search games..." onkeyup="searchGames()">

  <br><br>

  <p id="userText">Not logged in</p>
  <button onclick="login()">Login with Google</button>
</div>

<div id="games" class="grid">

  <!-- GAME 1 -->
  <div class="card">
    <img src="images/game1.png">
    <h3>Geometry Challenge</h3>
    <a class="btn" href="#">Play</a>
    <button class="like" onclick="like('g1')">❤️ <span id="g1">0</span></button>
  </div>

  <!-- GAME 2 -->
  <div class="card">
    <img src="images/game2.png">
    <h3>Brain Puzzle</h3>
    <a class="btn" href="#">Play</a>
    <button class="like" onclick="like('g2')">❤️ <span id="g2">0</span></button>
  </div>

  <!-- GAME 3 -->
  <div class="card">
    <img src="images/game3.png">
    <h3>Ping Pong Duel</h3>
    <a class="btn" href="#">Play</a>
    <button class="like" onclick="like('g3')">❤️ <span id="g3">0</span></button>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  appId: "YOUR_APP"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* LOGIN */
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(user=>{
    document.getElementById("userText").innerText =
      "Logged in as: " + user.user.displayName;
  });
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("userText").innerText =
      "Logged in as: " + user.displayName;
  }
});

/* LIKES (local for now, voidaan myöhemmin tehdä Firebase) */
function like(id){
  let v = localStorage.getItem(id) || 0;
  v++;
  localStorage.setItem(id, v);
  document.getElementById(id).innerText = v;
}

/* SEARCH */
function searchGames(){
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.getElementsByClassName("card");

  for(let c of cards){
    c.style.display = c.innerText.toLowerCase().includes(input)
    ? "block"
    : "none";
  }
}

/* LOAD LIKES */
window.onload = ()=>{
  ["g1","g2","g3"].forEach(id=>{
    document.getElementById(id).innerText =
      localStorage.getItem(id) || 0;
  });
};
</script>

</body>
</html>
